name: Translate site (FR / DE / PT / ES / IT)

# Run manually from the Actions tab whenever you want to (re)generate translations.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        working-directory: scripts
        run: npm install

      - name: Build localized site
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node i18n-build.mjs

      - name: Publish translations live
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Localize site into FR/DE/PT/ES/IT (premium native copy)" || echo "no changes"
          git push
