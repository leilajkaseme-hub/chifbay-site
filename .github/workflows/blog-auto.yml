name: Chifbay Journal — auto post (cloud, no API key)

# Runs in GitHub's cloud on a schedule — your computer can be OFF.
# Uses Claude Code with your subscription token (secret CLAUDE_CODE_OAUTH_TOKEN),
# NOT an Anthropic API key, so there is no per-token cost.
on:
  schedule:
    - cron: "0 9 * * *"   # every day at 09:00 UTC — change to e.g. "0 9 * * 1,3,5" for Mon/Wed/Fri
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write      # lets the self-heal step request a fresh Pages build

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate & publish one Journal post
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "$(cat scripts/blog-local/BLOG-INSTRUCTIONS.md)" \
            --permission-mode acceptEdits \
            --allowedTools "Read" "Write" "Edit" "Glob" "Grep" "WebSearch" "WebFetch" \
                           "Bash(date:*)" "Bash(git add:*)" "Bash(git commit:*)" \
                           "Bash(git push:*)" "Bash(git pull:*)" "Bash(git status:*)" "Bash(git log:*)"

      # GitHub Pages deploys can fail transiently ("Deployment failed, try again
      # later") — when that happens the post is committed but never goes live.
      # This step waits for the new post to appear on chifbay.com and, if it
      # doesn't, requests fresh Pages builds until it does.
      - name: Verify post is live (self-heal Pages deploy)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git pull --rebase origin main || true
          SLUG=$(python3 -c "import json; print(json.load(open('posts/posts.json'))[0]['slug'])")
          echo "Waiting for slug '$SLUG' to appear on the live site…"
          live_ok() {
            curl -sf --max-time 20 "https://chifbay.com/posts/posts.json?nocache=$(date +%s)" | grep -q "\"$SLUG\""
          }
          for attempt in 1 2 3 4; do
            for i in $(seq 1 12); do
              if live_ok; then echo "OK: post is live (attempt $attempt)"; exit 0; fi
              sleep 20
            done
            echo "Still not live — requesting a fresh Pages build (attempt $attempt)"
            gh api -X POST "repos/${GITHUB_REPOSITORY}/pages/builds" || true
          done
          echo "::error::Post is still not live after 4 heal attempts — check GitHub Pages status"
          exit 1

      # Push notification to the ntfy app if anything above failed.
      - name: Notify failure (ntfy)
        if: failure()
        run: |
          curl -s --max-time 20 \
            -H "Title: CHIFBAY blog post FAILED" \
            -H "Priority: high" -H "Tags: rotating_light,boat" \
            -d "Today's Chifbay Journal auto-post failed. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            https://ntfy.sh/futurx-blog-alerts-544024878e || true
