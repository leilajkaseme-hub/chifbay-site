name: Chifbay Reviews — auto sync (GetYourGuide + Google)

# MANUAL-TRIGGER-ONLY FALLBACK. The real, scheduled automation is a
# launchd job on futurx's Mac (com.chifbay.reviews-sync,
# scripts/reviews-auto/run-local-reviews-sync.sh), NOT this workflow.
#
# Why: both GetYourGuide and Google actively block GitHub Actions' shared
# runner IPs. Confirmed via debug logging on real CI runs — GetYourGuide
# returns a Cloudflare "An error occurred" error page (Ray ID and all) on
# every one of the 4 tour pages; Google serves a "limited view" of Maps
# with the Reviews tab stripped out. Both work fine from a home IP. A
# scheduled cron here would just fail every single run and spam failure
# alerts, so there is no `schedule:` trigger — this exists only so the
# same merge/build code can be run by hand (e.g. to test a data file
# edited manually) via the Actions tab.
#
# Tripadvisor is NOT scraped anywhere, local or cloud — DataDome (their
# bot-mitigation vendor) 403s every attempt, including from the home IP
# that GetYourGuide/Google are fine with — data/tripadvisor-manual.json is
# maintained by hand instead and just gets folded into the same merge.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/reviews-auto
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Configure git
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # No scraping steps here on purpose (see top-of-file comment) — this
      # only re-runs the merge/translate/publish step against whatever
      # data/gyg-reviews.json + data/google-reviews.json are already
      # committed (normally written by the local Mac job).
      - name: Merge sources, translate, regenerate reviews.html
        id: build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node build-reviews.mjs | tee /tmp/build-reviews.log
          {
            echo "new_count=$(grep -o 'NEW_REVIEW_COUNT=.*' /tmp/build-reviews.log | cut -d= -f2)"
            echo "new_summary=$(grep -o 'NEW_REVIEW_SUMMARY=.*' /tmp/build-reviews.log | cut -d= -f2-)"
          } >> "$GITHUB_OUTPUT"

      - name: Commit & push if anything changed
        id: commit
        working-directory: .
        env:
          NEW_COUNT: ${{ steps.build.outputs.new_count }}
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add -A
          git commit -m "Reviews sync: ${NEW_COUNT} new review(s)"
          git pull --rebase origin main || true
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Informational ping — a new review is good news, not a failure, so it
      # goes to the inbox topic, not the alerts one. Review author names are
      # guest-controlled text, so they're passed through env: (safe shell
      # variable expansion) rather than interpolated straight into the
      # script — GH Actions substitutes ${{ }} into the script text itself,
      # which would let a troll reviewer's display name execute as shell.
      - name: Notify new reviews (ntfy)
        if: steps.commit.outputs.changed == 'true' && steps.build.outputs.new_count != '0' && steps.build.outputs.new_count != ''
        env:
          NEW_COUNT: ${{ steps.build.outputs.new_count }}
          NEW_SUMMARY: ${{ steps.build.outputs.new_summary }}
        run: |
          curl -s --max-time 20 \
            -H "Title: New Chifbay review(s)" \
            -H "Priority: default" -H "Tags: star,boat" \
            -d "${NEW_COUNT} new review(s): ${NEW_SUMMARY}" \
            https://ntfy.sh/futurx-inbox-544024878e || true

      - name: Notify failure (ntfy)
        if: failure()
        run: |
          curl -s --max-time 20 \
            -H "Title: CHIFBAY reviews sync FAILED" \
            -H "Priority: high" -H "Tags: rotating_light,boat" \
            -d "Reviews auto-sync failed. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            https://ntfy.sh/futurx-blog-alerts-544024878e || true
