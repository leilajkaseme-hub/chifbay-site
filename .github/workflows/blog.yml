name: Chifbay Journal — generate post

# Scheduled runs disabled — the blog now runs locally on the Mac (no API key needed).
# Kept for optional manual runs only (would require an ANTHROPIC_API_KEY secret).
on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install generator deps
        working-directory: scripts
        run: npm install

      - name: Generate a new post
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-post.mjs

      - name: Open a pull request for review
        uses: peter-evans/create-pull-request@v7
        with:
          branch: blog/auto-${{ github.run_id }}
          title: "📝 New Journal post (review & merge to publish)"
          commit-message: "Add automated Chifbay Journal post"
          body: |
            A new blog post was generated by Claude (Opus 4.8 + web search).

            - Skim it for accuracy and tone
            - Merge this PR to publish it live on chifbay.com/blog.html
            - Or close it to discard

            _Auto-generated. Review before merging._
          add-paths: |
            posts/**
            sitemap.xml
