<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Chifbay — QR card (print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#050f18; --gold:#d4a843; --cream:#f4f2ec; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#20262c}
  /* A6 portrait (105 x 148 mm) — imprimer a 100% */
  .card{width:105mm;height:148mm;margin:10mm auto;background:var(--ink);color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:10mm;position:relative}
  .edge{position:absolute;inset:5mm;border:1px solid rgba(212,168,67,.30)}
  .logo{height:11mm;width:auto;display:block;margin-bottom:8mm}
  .ttl{font-family:'Playfair Display',serif;font-size:15pt;line-height:1.25;margin-bottom:7mm}
  .ttl em{font-style:italic;color:var(--gold)}
  /* panneau clair obligatoire : un QR clair sur fond sombre se scanne mal */
  .panel{background:var(--cream);border-radius:3mm;padding:5mm}
  .qr{width:46mm;height:46mm;display:block}
  .url{font-family:'Space Mono',monospace;font-size:7.6pt;letter-spacing:.08em;
    color:var(--gold);margin-top:7mm}
  .scan{font-family:'Space Mono',monospace;font-size:6.6pt;letter-spacing:.28em;
    text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:3mm}
  @page{size:105mm 148mm;margin:0}   /* Chrome ignore le nom "A6" : dimensions explicites */
  @media print{ html,body{background:#fff} .card{margin:0} }
</style>
</head>
<body>
<div class="card">
  <div class="edge"></div>
  <img class="logo" src="../assets/logo-white.png" alt="Chifbay">
  <div class="ttl">Leave us <em>a review</em></div>
  <div class="panel"><img class="qr" src="img/review-qr.png" alt="Scan to leave a Chifbay review" width="1640" height="1640">
</div>
  <div class="url">chifbay.com/review.html</div>
  <div class="scan">Scan with your camera</div>
</div>
</body>
</html>
