<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Chifbay — review card (print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#08131f; --gold:#d4a843; --gold-l:#e8c476; --cream:#f4f2ec; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#20262c}
  /* A5 portrait — imprimer a 100%, sans mise a l'echelle */
  .card{width:148mm;height:210mm;margin:10mm auto;position:relative;overflow:hidden;
    background:var(--ink);color:#fff;font-family:'Inter',sans-serif;
    display:flex;flex-direction:column}
  /* l'image porte deja le logo et la baseline : on ne surcharge rien par-dessus */
  .shot{position:relative;height:120mm;flex:none}
  .shot img{width:100%;height:100%;object-fit:cover;object-position:center 62%;display:block}
  .shot::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(8,19,31,0) 58%,rgba(8,19,31,.75) 85%,var(--ink) 100%)}
  .body{flex:0 1 auto;display:flex;flex-direction:column;align-items:center;text-align:center;
    padding:0 12mm;margin-top:-7mm;position:relative;z-index:2}
  h1{font-family:'Playfair Display',serif;font-weight:400;font-size:17pt;line-height:1.22;
    letter-spacing:-.01em;margin-bottom:5mm}
  h1 em{font-style:italic;color:var(--gold-l)}   /* aplat : un degrade background-clip:text s'imprime en bloc plein */
  /* panneau clair obligatoire : un QR clair sur fond sombre se scanne mal */
  .panel{background:var(--cream);border-radius:3mm;padding:5mm;border:1px solid rgba(255,255,255,.10)}
  .qr{width:40mm;height:40mm;display:block}
  .url{font-family:'Space Mono',monospace;font-size:8pt;letter-spacing:.08em;color:var(--gold);margin-top:5mm}
  .scan{font-family:'Space Mono',monospace;font-size:6.6pt;letter-spacing:.26em;text-transform:uppercase;
    color:rgba(255,255,255,.45);margin-top:2.5mm}
  .langs{font-size:7pt;letter-spacing:.10em;color:rgba(255,255,255,.40);margin-top:4mm;line-height:1.85}
  .foot{flex:none;border-top:1px solid rgba(255,255,255,.12);margin:auto 12mm 0;padding:3.5mm 0 5mm;
    display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:6.2pt;
    letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.34)}
  @page{size:148mm 210mm;margin:0}   /* dimensions explicites : Chrome ignore parfois le nom du format */
  @media print{ html,body{background:#fff} .card{margin:0} }
</style>
</head>
<body>
<div class="card">
  <div class="shot"><img src="img/chifbay-bluehour.jpg" alt=""></div>
  <div class="body">
    <h1>How was your day <em>on the water</em>?</h1>
    <div class="panel"><img class="qr" src="img/review-qr.png" alt="Scan to leave a Chifbay review" width="1640" height="1640">
</div>
    <div class="url">chifbay.com/review.html</div>
    <div class="scan">Scan to leave a review</div>
    <div class="langs">Laissez un avis · Bewerten Sie uns · Deixe a sua avaliação</div>
  </div>
  <div class="foot">
    <span>32.6442° N · 16.9165° W</span>
    <span>Funchal Marina · Madeira</span>
  </div>
</div>
</body>
</html>
